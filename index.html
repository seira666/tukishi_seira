  setTimeout(() => {

/* ======================================
   背景動画 完全版
====================================== */

window.addEventListener("load", () => {

  const isSP =
    window.innerWidth <= 600;

  const pcVideo =
    document.getElementById("bg-video-pc");

  const spVideo =
    document.getElementById("bg-video-sp");

  if(!pcVideo || !spVideo) return;

  // 使用動画

  const targetVideo =
    isSP ? spVideo : pcVideo;

  // 非使用停止

  if(isSP){

    pcVideo.pause();
    pcVideo.style.display = "none";

  }else{

    spVideo.pause();
    spVideo.style.display = "none";

  }

  // Safari autoplay対策

  targetVideo.muted = true;
  targetVideo.defaultMuted = true;

  targetVideo.setAttribute("muted","");
  targetVideo.setAttribute("autoplay","");
  targetVideo.setAttribute("loop","");
  targetVideo.setAttribute("playsinline","");
  targetVideo.setAttribute("webkit-playsinline","");

  // preload

  targetVideo.preload = "auto";

  // load

  targetVideo.load();

  // 再生関数

  const playVideo = () => {

    const promise =
      targetVideo.play();

    if(promise !== undefined){

      promise.catch(() => {});

    }

  };

  // 初回

  playVideo();

  // Safari復帰

  document.addEventListener(
    "touchstart",
    playVideo,
    { once:true }
  );

  // Chrome復帰

  document.addEventListener(
    "mousemove",
    playVideo,
    { once:true }
  );

  document.addEventListener(
    "click",
    playVideo,
    { once:true }
  );

  // タブ復帰

  document.addEventListener(
    "visibilitychange",
    () => {

      if(!document.hidden){

        playVideo();

      }

    }
  );

});

</script>
