<script>

/* ======================================
   Loading
====================================== */

window.addEventListener("load", () => {

  setTimeout(() => {

    document
      .getElementById("loading")
      .classList.add("hide");

  }, 2500);

});

/* ======================================
   背景動画
====================================== */

window.addEventListener("load", () => {

  const isSP =
    window.innerWidth <= 600;

  const pcVideo =
    document.getElementById("bg-video-pc");

  const spVideo =
    document.getElementById("bg-video-sp");

  /* 使用動画 */

  const targetVideo =
    isSP ? spVideo : pcVideo;

  /* 非使用停止 */

  if(isSP){

    pcVideo.pause();

  }else{

    spVideo.pause();

  }

  /* Safari対策 */

  targetVideo.muted = true;
  targetVideo.defaultMuted = true;

  targetVideo.setAttribute("muted","");
  targetVideo.setAttribute("autoplay","");
  targetVideo.setAttribute("loop","");
  targetVideo.setAttribute("playsinline","");
  targetVideo.setAttribute("webkit-playsinline","");

  /* 読み込み */

  targetVideo.load();

  /* 再生 */

  const playVideo = () => {

    const promise =
      targetVideo.play();

    if(promise !== undefined){

      promise
      .then(() => {

        console.log("動画再生成功");

      })
      .catch((error) => {

        console.log("再生失敗", error);

      });

    }

  };

  /* 初回 */

  playVideo();

  /* PC復帰 */

  document.addEventListener(
    "mousemove",
    playVideo,
    { once:true }
  );

  /* スマホ復帰 */

  document.addEventListener(
    "touchstart",
    playVideo,
    { once:true }
  );

  /* タブ復帰 */

  document.addEventListener(
    "visibilitychange",
    () => {

      if(!document.hidden){

        playVideo();

      }

    }
  );

});

</script>
