<!-- ======================================
     背景動画 自動再生
====================================== -->

<script>

window.addEventListener("load", () => {

  const videos =
    document.querySelectorAll("#mainimg video");

  videos.forEach(video => {

    video.muted = true;

    const playPromise = video.play();

    if(playPromise !== undefined){

      playPromise.catch(() => {

        const startVideo = () => {

          video.play();

          document.removeEventListener(
            "touchstart",
            startVideo
          );

          document.removeEventListener(
            "click",
            startVideo
          );

        };

        document.addEventListener(
          "touchstart",
          startVideo,
          { once:true }
        );

        document.addEventListener(
          "click",
          startVideo,
          { once:true }
        );

      });

    }

  });

});

</script>
