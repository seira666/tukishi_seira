/* ======================================
   背景固定
====================================== */

body#new{
  position:relative;
  background:none;
  overflow-x:hidden;
}

body#new::before{
  content:"";

  position:fixed;
  inset:0;

  background:
    url("images/game_start.png")
    center center / cover no-repeat;

  z-index:-10;

  transform:translateZ(0);
  -webkit-transform:translateZ(0);

/* ======================================

====================================== */

main{
  position:relative;
  z-index:1000;

  padding:
    120px
    40px
    80px

}

/* ======================================
   box
====================================== */

.box1{
  max-width:900px;

  margin:auto;

  padding:35px;

  border-radius:24px;

  background:
    rgba(0,0,0,0.45);

  backdrop-filter:blur(12px);

  box-shadow:
    0 0 30px rgba(0,0,0,0.35);
}

/* ======================================
   title
====================================== */

.news-title{
  margin:0 0 28px;

  font-size:34px;
  font-weight:bold;

  color:#e6e6fa;

  text-align:center;

  letter-spacing:0.08em;

  text-shadow:
    0 0 10px rgba(255,255,255,0.3),
    0 0 25px rgba(180,200,255,0.25);
}

/* ======================================
   news list
====================================== */

.news-list{
  display:flex;
  flex-direction:column;

  gap:18px;
}

.news-item{
  display:flex;
  align-items:center;

  gap:22px;

  padding:18px 22px;

  border-radius:18px;

  background:
    rgba(255,255,255,0.08);

  transition:0.3s;
}

.news-item:hover{
  transform:translateY(-3px);

  background:
    rgba(255,255,255,0.12);
}

/* 日付 */

.news-date{
  min-width:120px;

  font-size:14px;

  color:#b7dfff;

  font-weight:bold;
}

/* 内容 */

.news-text{
  flex:1;

  font-size:16px;
}

/* ======================================
   SNS
====================================== */

.icons{
  position:fixed;

  top:20px;
  right:20px;

  display:flex;
  flex-direction:column;

  gap:12px;

  z-index:999999;
}

.icons a{
  color:#fff;

  font-size:24px;

  transition:0.25s;

  text-shadow:
    0 0 10px rgba(0,0,0,0.7);
}

.icons a:hover{
  transform:scale(1.1);
}

/* ======================================
   footer
====================================== */

footer small{
  position:fixed;

  right:10px;
  bottom:10px;

  z-index:99999;

  opacity:0.75;
}

/* ======================================
   SP
====================================== */

@media screen and (max-width:600px){

  main{
    padding:
      100px
      16px
      70px;
  }

  .box1{
    padding:22px;
    border-radius:18px;
  }

  .news-title{
    font-size:24px;
  }

  .news-item{
    flex-direction:column;
    align-items:flex-start;

    gap:8px;

    padding:16px;
  }

  .news-date{
    min-width:auto;
    font-size:13px;
  }

  .news-text{
    font-size:14px;
  }

  .icons{
    top:85px;
    right:12px;
  }

}
